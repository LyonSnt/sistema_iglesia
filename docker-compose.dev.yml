services:
  web:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements-dev.txt
    command: >
      sh -c "
      test -f static/css/app.css || cp /opt/ecclesia-assets/app.css static/css/app.css &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8020
      "
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${APP_PORT:-8020}:8020"
    environment:
      DEBUG: "true"
      WAHA_BASE_URL: "http://waha:3000"

  celery_worker:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements-dev.txt
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      WAHA_BASE_URL: "http://waha:3000"

  celery_beat:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements-dev.txt
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"

  db:
    ports:
      - "${DB_PUBLIC_PORT:-5434}:5432"

  waha:
    ports:
      - "${WAHA_PORT:-3000}:3000"

  tailwind:
    image: node:20-alpine
    container_name: sistema_iglesia_tailwind
    working_dir: /app
    command: sh -c "npm install && npm run watch:css"
    volumes:
      - ./backend:/app
    restart: "no"