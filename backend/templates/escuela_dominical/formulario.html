<form class="space-y-5 rounded border border-slate-200 bg-white p-5"
      method="post"
      novalidate>
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ form.non_field_errors|striptags }}</div>
    {% endif %}
    {% for field in form %}
        {% if field.is_hidden %}
            {{ field }}
        {% else %}
            <label class="{% if field.field.widget.input_type == 'checkbox' %}flex items-center gap-2 text-sm font-medium text-slate-700{% else %}block{% endif %}">
                {% if field.field.widget.input_type == 'checkbox' %}
                    {{ field }} {{ field.label }}
                {% else %}
                    <span class="text-sm font-medium text-slate-700">{{ field.label }}</span>{{ field }}
                {% endif %}
                {% if field.errors %}<span class="mt-1 block text-sm text-red-700">{{ field.errors|striptags }}</span>{% endif %}
            </label>
        {% endif %}
    {% endfor %}
    <div class="flex gap-2 border-t border-slate-200 pt-5">
        <button class="rounded bg-slate-950 px-4 py-2 text-sm font-medium text-white"
                type="submit">Guardar</button>
        {% if cancelar_pk %}
            <a class="rounded border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700"
               href="{% url cancelar_url cancelar_pk %}">Cancelar</a>
        {% else %}
            <a class="rounded border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700"
               href="{% url cancelar_url %}">Cancelar</a>
        {% endif %}
    </div>
</form>
