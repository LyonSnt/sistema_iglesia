<!doctype html>
{% load static %}
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ecclesia{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  {% if request.user.is_authenticated %}
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3">
        <a class="font-semibold text-slate-950" href="{% url 'core:dashboard' %}">Ecclesia</a>
        <form method="post" action="{% url 'core:logout' %}">
          {% csrf_token %}
          <button class="text-sm font-medium text-slate-600 hover:text-slate-950" type="submit">Salir</button>
        </form>
      </div>
    </header>
  {% endif %}
  <main class="mx-auto max-w-7xl px-4 py-6">
    {% if messages %}<div class="mb-5 space-y-2">{% for message in messages %}<div class="rounded border border-slate-200 bg-white px-4 py-3 text-sm">{{ message }}</div>{% endfor %}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
