{% extends "base.html" %}
{% block title %}Anular {{ certificado.numero }} | Ecclesia{% endblock %}
{% block content %}
    <section class="mx-auto max-w-2xl space-y-6">
        <div class="border-b pb-6">
            <a class="text-sm text-slate-500" href="{% url 'certificados:list' %}">Certificados</a>
            <h1 class="mt-2 text-3xl font-semibold">Anular {{ certificado.numero }}</h1>
            <p class="mt-2 text-sm text-slate-600">{{ certificado.nombre_alumno }} - {{ certificado.nivel_cursado }}</p>
        </div>
        <form class="space-y-5 rounded border bg-white p-5" method="post">
            {% csrf_token %}{{ form.as_p }}
            <div class="flex gap-2">
                <button class="rounded bg-red-700 px-4 py-2 text-sm text-white">Confirmar anulacion</button>
                <a class="rounded border px-4 py-2 text-sm"
                   href="{% url 'certificados:list' %}">Cancelar</a>
            </div>
        </form>
    </section>
{% endblock %}
